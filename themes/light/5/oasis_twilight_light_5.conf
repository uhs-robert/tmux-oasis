# vim:set ft=tmux:
## name: Oasis Twilight Light 5
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#7f351a"
set -ogq @thm_primary "#782107"
set -ogq @thm_light_primary "#611e05"
set -ogq @thm_secondary "#3e008a"
set -ogq @thm_prefix "#7a6f10"
set -ogq @thm_fg "#3b3351"

# Surfaces and overlays
set -ogq @thm_core "#cac2f0"
set -ogq @thm_mantle "#bfb6ed"
set -ogq @thm_surface "#aa9de7"
set -ogq @thm_visual "#c3a1dd"

# General
set -ogq @thm_red "#8b0d0d"
set -ogq @thm_orange "#653a0f"
set -ogq @thm_yellow "#4a4518"
set -ogq @thm_green "#7e1215"
set -ogq @thm_teal "#264a45"
set -ogq @thm_blue "#0f457b"
set -ogq @thm_indigo "#5b1ba6"
