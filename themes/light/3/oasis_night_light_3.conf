# General
set -ogq @thm_red "#a11010"
set -ogq @thm_orange "#774412"
set -ogq @thm_yellow "#57511d"
set -ogq @thm_green "#951519"
set -ogq @thm_teal "#2c5851"
set -ogq @thm_blue "#125190"
set -ogq @thm_indigo "#6b20c3"
