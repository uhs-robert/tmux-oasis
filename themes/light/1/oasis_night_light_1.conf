# vim:set ft=tmux:
## name: Oasis Night Light 1
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#3c6085"
set -ogq @thm_primary "#355374"
set -ogq @thm_light_primary "#2c4962"
set -ogq @thm_secondary "#847d2e"
set -ogq @thm_prefix "#ab0707"
set -ogq @thm_fg "#52422d"

# Surfaces and overlays
set -ogq @thm_core "#e0dbcc"
set -ogq @thm_mantle "#dbd5c2"
set -ogq @thm_surface "#cfc7af"
set -ogq @thm_visual "#e1b69d"

# General
set -ogq @thm_red "#a21010"
set -ogq @thm_orange "#764412"
set -ogq @thm_yellow "#57511d"
set -ogq @thm_green "#951519"
set -ogq @thm_teal "#2c5851"
set -ogq @thm_blue "#125191"
set -ogq @thm_indigo "#6b1fc4"
