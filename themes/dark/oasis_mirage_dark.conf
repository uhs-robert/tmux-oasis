# vim:set ft=tmux:
## name: Oasis Mirage Dark
## author: uhs-robert

# Main
set -ogq @thm_strong_primary "#68c0b6"
set -ogq @thm_primary "#79c7be"
set -ogq @thm_light_primary "#96d4cb"
set -ogq @thm_secondary "#f8b471"
set -ogq @thm_prefix "#d2adff"
set -ogq @thm_fg "#ddefef"

# Surfaces and overlays
set -ogq @thm_core "#152229"
set -ogq @thm_mantle "#1c2b31"
set -ogq @thm_surface "#253840"
set -ogq @thm_visual "#666666"

# General
set -ogq @thm_red "#ff7979"
set -ogq @thm_orange "#f8b471"
set -ogq @thm_yellow "#f0e68c"
set -ogq @thm_green "#ffa0a0"
set -ogq @thm_teal "#8fd1c7"
set -ogq @thm_blue "#81c0ff"
set -ogq @thm_indigo "#c695ff"
