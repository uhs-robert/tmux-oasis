# status/modules/battery.conf
# vim:set ft=tmux:
# Battery percentage display - color matches current mode

# User configurable settings
set -ogq @oasis_battery_icon "⚡ " # Any icon or text (default: lightning emoji)

# Module definition
# Uses pmset for macOS, falls back to /sys/class/power_supply for Linux
set -ogq @oasis_module_battery "\
#[bg=#{@thm_surface},fg=#{E:@oasis_color_mode}]█\
#[bg=#{E:@oasis_color_mode},fg=#{@thm_surface},bold] #{@oasis_battery_icon}#(pmset -g batt 2>/dev/null | grep -Eo '[0-9]+%%' | head -1 || cat /sys/class/power_supply/BAT0/capacity 2>/dev/null | xargs -I{} echo {}%%) "
